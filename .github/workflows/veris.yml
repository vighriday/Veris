name: Veris CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-smoke:
    name: build + smoke (Node ${{ matrix.node }})
    strategy:
      matrix:
        node: ['18', '20', '22']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Doctor
        run: node dist/cli.js doctor

      - name: Smoke-test CLI
        run: node dist/cli.js . --base-ref=origin/${{ github.base_ref || github.ref_name }} --quiet
        env:
          VERIS_CONFIDENCE_THRESHOLD: '0'

      - name: Smoke-test MCP chain
        run: npx ts-node tests/test-mcp-deep.ts
        timeout-minutes: 2

      - name: Upload Veris Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veris-reports-node${{ matrix.node }}
          path: veris-reports/
          if-no-files-found: ignore
