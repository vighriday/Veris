name: Feature request
description: Propose a new capability or improvement.
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What pain are you trying to remove? Be concrete.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Optional. What would good look like?
  - type: dropdown
    attributes:
      label: Surface
      multiple: true
      options:
        - CLI
        - MCP tool
        - Dashboard
        - Plugin API
        - Docs
        - Marketplace listings
