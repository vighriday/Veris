name: Bug report
description: Something Veris is doing wrong.
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      description: Minimal steps. Include the command run and the repo shape if relevant.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: veris doctor output
      description: Run `veris doctor` and paste the full output.
      render: shell
  - type: input
    attributes:
      label: Veris version
      placeholder: "2.1.0"
    validations:
      required: true
  - type: input
    attributes:
      label: Node version
      placeholder: "20.x"
    validations:
      required: true
  - type: input
    attributes:
      label: MCP client
      description: Which MCP-compatible agent or runtime were you using? Or "CLI only" if you ran Veris standalone.
      placeholder: "e.g. CLI only, or your MCP client name + version"
